# YAML-defined tools for teammate ROS services/topics/listeners.
# 注：get_bodyhub_status / get_battery_state / detect_face 已由内置工具提供，
# 这里只保留内置没有覆盖的动态工具。See README "YAML 动态工具" for examples.
dynamic_ros_tools:
  dynamic_stop_aiui_playback:
    type: topic
    description: 向 AIUI 停止播放 topic 发布空消息，停止当前语音播放。
    risk: low
    topic: /aiui/stop_play
    message_type: std_msgs/Empty
    queue_size: 2
    parameters:
      type: object
      properties: {}
